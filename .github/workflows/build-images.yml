name: Build & publish Docker images

# Триггеры:
#   - push tag v* (например v1.0.0) → собирает релизные образы с тегами {VERSION}, latest
#   - push в main           → собирает edge-образ с тегом 'edge' (для тестов)
#   - workflow_dispatch     → ручной запуск из UI GitHub
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия (например 1.0.0). Если пусто — берётся из VERSION файла.'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  # IMAGE_NAMESPACE заполняется в шаге "Lowercase namespace" — Docker требует lowercase,
  # а github.repository может содержать заглавные (например Liliya2002/REMNAWAVE_WEBHOME).

permissions:
  contents: read
  packages: write   # для push в ghcr.io
  id-token: write   # для OIDC, если понадобится

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - image: deploy-runner
            context: ./deploy-runner
            dockerfile: ./deploy-runner/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # нужен для git describe / SHA

      - name: Lowercase namespace
        id: ns
        run: |
          NS="${GITHUB_REPOSITORY,,}"   # bash в GHA — поддерживает ${var,,}
          echo "namespace=${NS}" >> "$GITHUB_OUTPUT"
          echo "→ IMAGE_NAMESPACE=${NS}"

      - name: Compute version metadata
        id: meta_vars
        run: |
          # Версия: tag (если есть) | input | VERSION файл
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(cat VERSION 2>/dev/null || echo '0.0.0-dev')"
          fi

          BUILD_SHA="${GITHUB_SHA}"
          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "BUILD_SHA=${BUILD_SHA}" >> "$GITHUB_OUTPUT"
          echo "BUILD_DATE=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

          echo "→ VERSION=${VERSION}"
          echo "→ BUILD_SHA=${BUILD_SHA}"
          echo "→ BUILD_DATE=${BUILD_DATE}"

      - name: Stage VERSION file into image context
        run: |
          # Backend образ должен видеть VERSION в своём контексте.
          # Кладём копию в backend/ — это самый простой способ.
          cp VERSION backend/VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker tags & labels
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.ns.outputs.namespace }}-${{ matrix.image }}
          tags: |
            # Релизный тег: v1.2.3 → 1.2.3
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # latest на самом свежем релизе
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # edge на main-ветке
            type=raw,value=edge,enable={{is_default_branch}}
            # SHA для отладки
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=vpnwebhome-${{ matrix.image }}
            org.opencontainers.image.version=${{ steps.meta_vars.outputs.VERSION }}
            org.opencontainers.image.revision=${{ steps.meta_vars.outputs.BUILD_SHA }}
            org.opencontainers.image.created=${{ steps.meta_vars.outputs.BUILD_DATE }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta_vars.outputs.VERSION }}
            BUILD_SHA=${{ steps.meta_vars.outputs.BUILD_SHA }}
            BUILD_DATE=${{ steps.meta_vars.outputs.BUILD_DATE }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64

      - name: Image digest summary
        run: |
          echo "### ${{ matrix.image }} pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.docker_meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Установка

            На сервере выполните:
            ```bash
            cd /path/to/vpnwebhome
            git fetch && git checkout ${{ github.ref_name }}
            bash deploy/deploy.sh ${{ github.ref_name }}
            ```

            Образы доступны в [GHCR](https://github.com/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}-backend):
            - `ghcr.io/${{ github.repository }}-backend:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository }}-frontend:${{ github.ref_name }}`
