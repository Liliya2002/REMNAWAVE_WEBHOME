<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="shield-border" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="v-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <radialGradient id="v-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Магические искры по бокам -->
  <g fill="#fde68a">
    <path d="M 9 14 L 10.2 16.2 L 12.5 17 L 10.2 17.8 L 9 20 L 7.8 17.8 L 5.5 17 L 7.8 16.2 Z"/>
    <path d="M 55 14 L 56.2 16.2 L 58.5 17 L 56.2 17.8 L 55 20 L 53.8 17.8 L 51.5 17 L 53.8 16.2 Z"/>
    <circle cx="32" cy="6" r="1.2"/>
  </g>

  <!-- Щит: внешняя золотая обводка -->
  <path d="M 13 11
           L 51 11
           L 51 36
           Q 51 50 32 60
           Q 13 50 13 36 Z"
        fill="url(#shield-border)"/>

  <!-- Щит: внутренний градиент-фон -->
  <path d="M 15.5 13
           L 48.5 13
           L 48.5 36
           Q 48.5 48.5 32 57
           Q 15.5 48.5 15.5 36 Z"
        fill="url(#shield-fill)"/>

  <!-- Внутренняя тонкая золотая линия (геральдический акцент) -->
  <path d="M 17.5 15
           L 46.5 15
           L 46.5 36
           Q 46.5 47 32 54.5
           Q 17.5 47 17.5 36 Z"
        fill="none" stroke="#fbbf24" stroke-width="0.6" opacity="0.55"/>

  <!-- Магическое свечение под буквой -->
  <circle cx="32" cy="34" r="14" fill="url(#v-glow)"/>

  <!-- Буква V (геральдический шрифт с засечками) -->
  <path d="M 19 19
           L 27 19
           L 28.5 21
           L 32 38
           L 35.5 21
           L 37 19
           L 45 19
           L 43.5 21.5
           L 35 50
           L 29 50
           L 20.5 21.5
           Z"
        fill="url(#v-fill)"
        stroke="#fbbf24"
        stroke-width="0.7"
        stroke-linejoin="round"/>

  <!-- Вершина щита: руническая корона из 3 точек -->
  <g fill="#fbbf24">
    <circle cx="22" cy="13" r="0.9"/>
    <circle cx="32" cy="13" r="1.1"/>
    <circle cx="42" cy="13" r="0.9"/>
  </g>
</svg>
