<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="lock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>

  <!-- Фон: скруглённый квадрат с градиентом -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Глобус: круг + меридиан-эллипс + экватор -->
  <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.95">
    <circle cx="29" cy="29" r="18"/>
    <ellipse cx="29" cy="29" rx="7.5" ry="18"/>
    <line x1="11" y1="29" x2="47" y2="29"/>
  </g>

  <!-- Бейдж-замочек справа снизу -->
  <g transform="translate(38 38)">
    <circle cx="11" cy="11" r="12" fill="url(#lock)" stroke="#ffffff" stroke-width="1.5"/>
    <rect x="6.5" y="11" width="9" height="7.5" rx="1.5" fill="#ffffff"/>
    <path d="M 8 11 V 9 a 3 3 0 0 1 6 0 V 11" stroke="#ffffff" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <circle cx="11" cy="14.3" r="0.9" fill="#0c4a6e"/>
  </g>
</svg>
