server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Безопасность
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Блокируем скрытые файлы/директории (.git, .env, .htaccess, .DS_Store ...).
  # Самозащита от случайно попавших в образ файлов и от сканеров безопасности.
  # ВАЖНО: должно идти ПЕРЕД try_files в location / — иначе SPA-fallback отдаст
  # 200 даже на /.git/config (а в логах был именно такой инцидент).
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
  }

  # Long cache для иммутабельных ассетов с хешем в имени
  location ~* \.(?:js|css|woff2?|png|jpe?g|webp|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — любой путь что не файл, отдаёт index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html без кеша — чтобы новые сборки сразу подхватывались
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
